    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #fff0f6;
            min-height: 100vh;
            padding: 1rem;
        }
        h1 {
            color: #ff6b9d;
            text-align: center;
            margin: 1.5rem 0;
            font-size: 2rem;
            font-weight: 600;
        }
        /* 大框架优化 */
        .big-frame {
            background-color: white;
            border: 2px solid #ff6b9d;
            border-radius: 16px;
            padding: 1.2rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(255, 107, 157, 0.15);
        }
        .big-frame h2 {
            color: #ff6b9d;
            text-align: center;
            margin-bottom: 1.2rem;
            font-size: 1.4rem;
            font-weight: 600;
        }
        /* 小框架关键优化：解决安卓按钮换行问题 */
        .small-frame {
            border: 2px solid #ff9eb5;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: nowrap; /* 强制不换行 */
        }
        .small-frame:last-child {
            margin-bottom: 0;
        }
        .name-input {
            flex: 1;
            min-width: 0; /* 解决安卓文字挤不下的问题 */
            padding: 0.8rem;
            border: 1px solid #ff9eb5;
            border-radius: 8px;
            font-size: 1rem;
            color: #333;
            background-color: #fff;
        }
        .quick-btn {
            background-color: #ff6b9d;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.8rem 1rem;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap; /* 按钮文字强制不换行 */
            flex-shrink: 0; /* 按钮宽度固定，不被挤压 */
            transition: background-color 0.2s;
        }
        .quick-btn:hover {
            background-color: #ff4d8a;
        }
        /* 适配小屏幕 */
        @media (max-width: 360px) {
            .name-input {
                font-size: 0.9rem;
                padding: 0.7rem;
            }
            .quick-btn {
                font-size: 0.85rem;
                padding: 0.7rem 0.8rem;
            }
        }
    </style>
</head>
